security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            id: App\Security\UserProvider
            

    # https://symfony.com/doc/current/security.html#hierarchical-roles
    role_hierarchy:
        ROLE_ADMIN:       ROLE_EVALUATEUR
        ROLE_EVALUATEUR:  ROLE_USER

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        
        main:
            lazy: true
            provider: app_user_provider
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: _username
                password_parameter: _password
                enable_csrf: true
                use_referer: true
                success_handler: App\Security\AuthenticationSuccessHandler
            logout:
                path: app_logout
                # where to redirect after logout
                target: app_login

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/espace-interne-securise, roles: PUBLIC_ACCESS }
        - { path: ^/public-candidat/, roles: PUBLIC_ACCESS }
        - { path: ^/documents/consulter, roles: PUBLIC_ACCESS }
        - { path: ^/documents/candidat, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: [ROLE_ADMIN, ROLE_EVALUATEUR] }
        # On laisse le reste public pour l'instant (accueil, postuler)


when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
            session_fixation_strategy: migrate
        